name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (universal kernel — source lives in torch-ext, not pip-installed)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest
      - name: Test
        # The Λ kernel is a UNIVERSAL (pure-PyTorch) kernel; its source is in
        # torch-ext/ and the reference impl in tests/. Point PYTHONPATH there
        # rather than pip-installing (there is no PEP 517 build backend).
        run: PYTHONPATH="${GITHUB_WORKSPACE}/torch-ext:${GITHUB_WORKSPACE}/tests" pytest -q
