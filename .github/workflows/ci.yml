name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (universal kernel — source lives in torch-ext, not pip-installed)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest
      - name: Test
        # The Λ kernel is a UNIVERSAL (pure-PyTorch) kernel; its source is in
        # torch-ext/ and the reference impl in tests/. Point PYTHONPATH there
        # rather than pip-installing (there is no PEP 517 build backend).
        run: PYTHONPATH="${GITHUB_WORKSPACE}/torch-ext:${GITHUB_WORKSPACE}/tests" pytest -q
